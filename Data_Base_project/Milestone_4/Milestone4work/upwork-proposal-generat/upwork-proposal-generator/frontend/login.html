<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – Upwork Proposal Generator</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-logo">
    <div class="logo-icon">U</div>
    <span>ProposalGen</span>
  </div>

  <h2>Welcome back</h2>
  <p class="subtitle">Sign in to your freelancer account</p>

  <div class="form-group">
    <label for="email">Email address</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
  </div>

  <div class="form-group">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <p class="error-msg" id="errorMsg"></p>

  <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Sign In</button>

  <p class="auth-footer">Don't have an account? <a href="signup.html">Create one</a></p>
  <p class="auth-footer" style="margin-top:6px;"><a href="admin-login.html">Admin Sign In →</a></p>
</div>

<script>
async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('errorMsg');
  const btn      = document.getElementById('loginBtn');

  errEl.classList.remove('show');

  if (!email || !password) {
    errEl.textContent = 'Please fill in all fields.';
    errEl.classList.add('show');
    return;
  }

  btn.disabled    = true;
  btn.textContent = 'Signing in…';

  try {
    const res  = await fetch('/api/auth/login', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (data.success) {
      window.location.href = 'dashboard.html';
    } else {
      errEl.textContent = data.message || 'Login failed.';
      errEl.classList.add('show');
    }
  } catch {
    errEl.textContent = 'Server error. Is the backend running?';
    errEl.classList.add('show');
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Sign In';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
